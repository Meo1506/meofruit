<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded green background -->
  <rect width="32" height="32" rx="8" fill="#16a34a"/>

  <!-- Watermelon semicircle: green rind -->
  <path d="M5 21 A11 11 0 0 1 27 21 Z" fill="#15803d"/>
  <!-- White inner rind -->
  <path d="M6.5 21 A9.5 9.5 0 0 1 25.5 21 Z" fill="#dcfce7"/>
  <!-- Red flesh -->
  <path d="M8 21 A8 8 0 0 1 24 21 Z" fill="#f87171"/>

  <!-- Seeds -->
  <ellipse cx="12.5" cy="19" rx="1" ry="1.4" fill="#166534" transform="rotate(-12 12.5 19)"/>
  <ellipse cx="16" cy="17.5" rx="1" ry="1.4" fill="#166534"/>
  <ellipse cx="19.5" cy="19" rx="1" ry="1.4" fill="#166534" transform="rotate(12 19.5 19)"/>

  <!-- Flat cut bottom -->
  <rect x="5" y="20.5" width="22" height="2" rx="1" fill="#15803d"/>
</svg>
